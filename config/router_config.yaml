metadata:
  version: "1.0.2"
  cache:
    ttl_sec: 3600
    max_size: 2000
  log_paths:
    unresolved: "logs/unresolved.jsonl"
    canary: "logs/canary_semantic.jsonl"

semantic:
  enabled: false
  threshold: 0.82
  timeout: 0.5

syntax:
  temperature: 1.3
  weights:
    query_info:
      has_question: 0.4
      has_wh_pronoun: 0.5
      short_len: 0.1
      has_nsubj: 0.3
      has_dobj: 0.2
      verb_count: 0.2
    export_task:
      imperative_verb: 0.5
      has_format_kw: 0.4
      has_dobj: 0.1
    compare_analysis:
      coordination: 0.8
      comparative_marker: 0.8
      has_nsubj: 0.2

intents:
  query_info:
    canonical_phrases:
      - "查一下{entity}"
      - "关于{entity}的信息"
      - "{entity}教什么课"
      - "谁负责{entity}"
      - "介绍一下{entity}"
      - "{entity}的{attribute}是什么"
  export_task:
    canonical_phrases:
      - "导出为{format}"
      - "保存成{format}格式"
      - "生成{format}报告"
  compare_analysis:
    canonical_phrases:
      - "对比{left}和{right}"
      - "比较{left}与{right}的区别"
      - "{left}和{right}谁更{metric}"

slot_schemas:
  query_info:
    required: ["entity"]
    optional: []
    types: { entity: "str" }
  export_task:
    required: ["format"]
    optional: []
    types: { format: "str" }
  compare_analysis:
    required: ["left", "right"]
    optional: ["metric"]
    types: { left: "str", right: "str", metric: "str" }

slot_extraction_rules:
  query_info:
    entity:
      type: "entity"
      index: 0
  export_task:
    format:
      type: "regex_enum"
      pattern: "(?i)(PDF|Excel|JSON|Markdown)"
  compare_analysis:
    left:
      type: "entity"
      index: 0
    right:
      type: "entity"
      index: 1

entities:
  哈利:
    name: "哈利"
    aliases: ["哈利·波特", "Harry Potter", "哈利波特", "hp"]
    roles: ["student", "protagonist"]
  罗恩:
    name: "罗恩"
    aliases: ["罗恩·韦斯莱", "Ron Weasley", "罗恩韦斯莱"]
    roles: ["student", "friend"]
  赫敏:
    name: "赫敏"
    aliases: ["赫敏·格兰杰", "Hermione Granger", "赫敏格兰杰"]
    roles: ["student", "friend"]
  斯内普:
    name: "斯内普"
    aliases: ["斯内普教授", "西弗勒斯·斯内普", "Severus Snape"]
    roles: ["teacher", "antagonist"]
  奇洛:
    name: "奇洛"
    aliases: ["奇洛教授", "奎里纳斯·奇洛", "Quirinus Quirrell"]
    roles: ["teacher", "antagonist"]
  伏地魔:
    name: "伏地魔"
    aliases: ["Voldemort", "汤姆·里德尔", "Tom Riddle", "神秘人", "黑魔王"]
    roles: ["villain"]
  邓布利多:
    name: "邓布利多"
    aliases: ["阿不思·邓布利多", "Albus Dumbledore", "校长"]
    roles: ["teacher", "mentor"]
  麦格:
    name: "麦格"
    aliases: ["麦格教授", "米勒娃·麦格", "Minerva McGonagall"]
    roles: ["teacher"]

out_of_domain_keywords:
  - "天气"
  - "等于几"
  - "乱七八糟"
  - "1+1"
  - "现在几点"
  - "股票"
  - "新闻"

suggestion_template: "⚠️ 缺少必要参数: {missing}，请补充后重试"


# 🔑 动态谓词权重（按需调整，零硬编码）
predicate_weights:
  help: 2.5
  helps: 2.5
  帮助: 2.5
  teach: 2.0
  teaches: 2.0
  教: 2.0
  belong_to: 1.0
  DEFAULT: 1.0
slot_keywords: ["什么", "谁", "哪里", "何时"]